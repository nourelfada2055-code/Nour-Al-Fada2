<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>تسجيل رحلة</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: 'Segoe UI', Tahoma;
  background: #f3f6f4;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* الكارت */
.container {
  background: #fff;
  padding: 20px;
  border-radius: 16px;
  width: 95%;
  max-width: 380px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
  animation: fadeIn 0.6s ease;
  text-align: center;
}

/* العنوان */
.main-title {
  font-size: 20px;
  font-weight: bold;
  color: #2d6a4f;
}

.sub-title {
  font-size: 16px;
  color: #555;
  margin-bottom: 15px;
}

/* الحقول */
input, select {
  width: 100%;
  padding: 11px;
  margin: 7px 0;
  border-radius: 10px;
  border: 1px solid #ddd;
  font-size: 15px;
  transition: all 0.25s ease;
  background: #fafafa;
}

/* 🔥 الحقل كله يتحول أخضر */
input:focus, select:focus {
  border-color: #2ecc71;
  background: #eafaf1;
  transform: scale(1.03);
  box-shadow: 0 4px 12px rgba(46,204,113,0.2);
  outline: none;
}

/* زر */
button {
  width: 100%;
  padding: 12px;
  margin-top: 12px;
  border: none;
  border-radius: 10px;
  background: #2ecc71;
  color: #fff;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #27ae60;
  transform: translateY(-2px);
}

/* أنيميشن */
@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(15px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
</style>

</head>

<body>

<div class="container">

<div class="main-title">🚛 مؤسسة نور الفضا للنقليات</div>
<div class="sub-title">تسجيل رحلة</div>

<form id="tripForm">

<input type="date" id="date" required>

<select id="driver" required>
<option value="">اختر السائق</option>
<option>عبدالله نصرالدين</option>
<option>محمد اسماعيل</option>
  <option>علي عبدالرازق</option>
<option>سلمان خان</option>
</select>

<select id="car" required>
<option value="">رقم السيارة</option>
<option>3523</option>
<option>3521</option>
  <option>3525</option>
<option>3602</option>
</select>

<select id="company" required>
<option value="">الشركة</option>
<option>شركة المذاق العربي</option>
<option>شركة ابو داود</option>
</select>

<input type="text" id="from" placeholder="من" required>
<input type="text" id="to" placeholder="إلى" required>

<button type="submit">إرسال</button>

</form>
</div>

<script>
document.getElementById("tripForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const data = {
    date: document.getElementById("date").value,
    driver: document.getElementById("driver").value,
    car: document.getElementById("car").value,
    company: document.getElementById("company").value,
    from: document.getElementById("from").value,
    to: document.getElementById("to").value
  };

  fetch("https://script.google.com/macros/s/AKfycbyQa3LZgXVTMT6A6Ivm0ejo_TrA2iFk8H1NqsELhF4il1m3VV1gnUlAAoh2eOpGBz5P/exec", {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(res => res.text())
  .then(() => {
    window.location.href = "view.html";
  })
  .catch(() => {
    alert("حدث خطأ ❌");
  });
});
</script>

</body>
</html>
