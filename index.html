<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>تسجيل رحلة</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: 'Segoe UI', Tahoma;
  background: #f3f6f4;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* الكارت */
.container {
  background: #fff;
  padding: 20px;
  border-radius: 16px;
  width: 95%;
  max-width: 380px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
  text-align: center;
}

/* العنوان */
.main-title {
  font-size: 20px;
  font-weight: bold;
  color: #2d6a4f;
}

.sub-title {
  font-size: 16px;
  color: #555;
  margin-bottom: 15px;
}

/* الحقول */
input, select {
  width: 100%;
  padding: 11px;
  margin: 7px 0;
  border-radius: 10px;
  border: 1px solid #ddd;
  font-size: 15px;
  transition: all 0.25s ease;
  background: #fafafa;
}

/* عند التركيز */
input:focus, select:focus {
  border-color: #2ecc71;
  background: #eafaf1;
  transform: scale(1.03);
  box-shadow: 0 4px 12px rgba(46,204,113,0.2);
  outline: none;
}

/* الزر */
button {
  width: 100%;
  padding: 12px;
  margin-top: 12px;
  border: none;
  border-radius: 10px;
  background: #2ecc71;
  color: #fff;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #27ae60;
  transform: translateY(-2px);
}
</style>

</head>

<body>

<div class="container">

<div class="main-title">🚛 مؤسسة نور الفضا للنقليات</div>
<div class="sub-title">تسجيل رحلة</div>

<form id="tripForm">

<input type="date" id="date" required>

<select id="driver" required>
<option value="">اختر السائق</option>
<option>أحمد</option>
<option>محمد</option>
</select>

<select id="car" required>
<option value="">رقم السيارة</option>
<option>123</option>
<option>456</option>
</select>

<select id="company" required>
<option value="">الشركة</option>
<option>شركة 1</option>
<option>شركة 2</option>
</select>

<input type="text" id="from" placeholder="من" required>
<input type="text" id="to" placeholder="إلى" required>

<button type="submit">إرسال</button>

</form>

</div>

<script>
document.getElementById("tripForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const formData = new FormData();
  formData.append("date", document.getElementById("date").value);
  formData.append("driver", document.getElementById("driver").value);
  formData.append("car", document.getElementById("car").value);
  formData.append("company", document.getElementById("company").value);
  formData.append("from", document.getElementById("from").value);
  formData.append("to", document.getElementById("to").value);

  fetch("https://script.google.com/macros/s/AKfycbwC6iiUmvdrhxi6T3r2M-TKl9tC0zd1rbPNKLYaQn7XctwzG1L2xjsHD7mOytA_0WRe/exec", {
    method: "POST",
    body: formData
  })
  .then(res => res.text())
  .then(() => {
    window.location.href = "view.html";
  })
  .catch(() => {
    alert("حدث خطأ ❌");
  });
});
</script>

</body>
</html>
