
<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>تسجيل رحلة</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- منع الكاش -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <style>
    body {
      font-family: Arial;
      direction: rtl;
      text-align: center;
      padding: 20px;
      background: #f5f5f5;
    }

    form {
      background: #fff;
      padding: 15px;
      border-radius: 10px;
      max-width: 400px;
      margin: auto;
      box-shadow: 0 0 10px #ccc;
    }

    input, select, button {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      font-size: 16px;
    }

    button {
      background: green;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h2>تسجيل رحلة</h2>

<form id="tripForm">

  <input type="date" id="date" required>

  <select id="driver" required>
    <option value="">اختر السائق</option>
    <option>أحمد</option>
    <option>محمد</option>
  </select>

  <select id="car" required>
    <option value="">رقم السيارة</option>
    <option>123</option>
    <option>456</option>
  </select>

  <select id="company" required>
    <option value="">الشركة</option>
    <option>شركة 1</option>
    <option>شركة 2</option>
  </select>

  <input type="text" id="from" placeholder="من" required>
  <input type="text" id="to" placeholder="إلى" required>

  <button type="submit">إرسال</button>

</form>

<script>
document.getElementById("tripForm").addEventListener("submit", function(e) {
  e.preventDefault(); // 🔥 يمنع الريلود

  const data = {
    date: document.getElementById("date").value,
    driver: document.getElementById("driver").value,
    car: document.getElementById("car").value,
    company: document.getElementById("company").value,
    from: document.getElementById("from").value,
    to: document.getElementById("to").value
  };

  fetch("https://script.google.com/macros/s/AKfycbwFmzy6ppvi5x-4cyobBlX9d-LE38tnVBRwtZjuCyymAz_YmlGTHyGcOUDu0a_zXOwO/exec", {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(res => res.text())
  .then(response => {
    alert("تم الإرسال بنجاح ✅");

    // مسح البيانات بعد الإرسال
    document.getElementById("tripForm").reset();
  })
  .catch(err => {
    alert("حدث خطأ ❌");
  });
});
</script>
